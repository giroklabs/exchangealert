name: Fetch Market Dashboard Data

on:
  push:
    branches:
      - main
  schedule:
    # 하루 2회 실행 (KST 오전 9:10, 오후 9:10)
    - cron: '10 0,12 * * *'
  workflow_dispatch: # 수동 실행 가능
  repository_dispatch:
    types: [trigger-market-update]

# 동시 실행 방지
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fetch-market-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Market Indicators
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          # push 이벤트일 때는 AI 분석을 스케줄 작업으로 미루고 비용을 아낌
          SKIP_AI_ANALYSIS: ${{ github.event_name == 'push' && 'true' || 'false' }}
        run: |
          node scripts/fetch-market-dashboard.js 2>&1 | tee script_debug.log

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data/market-dashboard.json script_debug.log script_output.log || true
          git diff --staged --quiet || git commit -m "data: 환율 지표 데이터 및 디버그 로그 업데이트"
          git push
