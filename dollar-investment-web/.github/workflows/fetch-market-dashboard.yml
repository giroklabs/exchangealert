name: Fetch Market Dashboard Data

on:
  schedule:
    # 매일 한국시간 오전 9시 10분 (UTC 0시 10분)에 실행
    - cron: '10 0 * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  fetch-market-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Market Indicators using FRED API
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: |
          node scripts/fetch-market-dashboard.js

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add public/data/market-dashboard.json
          git diff --staged --quiet || git commit -m "Update market dashboard data from FRED [skip ci]"
          git push
