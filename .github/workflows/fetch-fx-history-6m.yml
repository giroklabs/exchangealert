name: Fetch FX 6-Month History

on:
  schedule:
    - cron: '0 0 * * *' # 매일 9시 (KST, UTC+0)
  workflow_dispatch:

jobs:
  fetch-fx-history:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch FX History
        run: node dollar-investment-web/scripts/fetch-fx-6m-history.js

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add dollar-investment-web/public/data/fx-history-6m.json
          git commit -m "Update FX 6-month history" || exit 0
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
