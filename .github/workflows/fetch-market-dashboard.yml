name: Fetch Market Dashboard Data

on:
  push:
    branches:
      - main
  schedule:
    # 5분 단위로 실행
    - cron: '*/5 * * * *'
  workflow_dispatch: # 수동 실행 가능
  repository_dispatch:
    types: [trigger-market-update] # 공유된 트리거 이름 사용

# 동시 실행 방지: 이전 작업이 진행 중이면 취소하고 최신 작업 수행
concurrency:
  group: fetch-market-dashboard
  cancel-in-progress: true

jobs:
  fetch-market-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache KIS Token
        uses: actions/cache@v4
        with:
          path: dollar-investment-web/.kis-token.json
          key: kis-token-${{ github.run_id }}
          restore-keys: |
            kis-token-

      - name: Fetch Market Indicators
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KRX_API_KEY: ${{ secrets.KRX_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "🚀 Starting data fetch..."
          node dollar-investment-web/scripts/fetch-market-dashboard.js
          echo "✅ Data fetch process completed."

      - name: Commit and push
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dollar-investment-web/public/data/market-dashboard.json
          if ! git diff --staged --quiet; then
            git commit -m "data: 환율 지표 데이터 및 AI 분석 업데이트"
            for i in 1 2 3; do
              git pull --rebase origin main || true
              if git push origin main; then
                break
              else
                sleep 5
              fi
            done
            echo "✅ Data updated and pushed to main."
          else
            echo "No changes to commit"
          fi

      - name: Trigger deployment workflow
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const { data: workflows } = await github.rest.actions.listRepoWorkflows({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              
              const deployWorkflow = workflows.workflows.find(
                w => w.name === 'Deploy Dollar Investment Web to GitHub Pages'
              );
              
              if (deployWorkflow) {
                await github.rest.actions.createWorkflowDispatch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: deployWorkflow.id,
                  ref: 'main',
                });
                console.log('✅ Deployment workflow triggered:', deployWorkflow.name);
              } else {
                console.log('⚠️ Deployment workflow not found.');
              }
            } catch (error) {
              console.error('❌ Failed to trigger deployment workflow:', error.message);
            }
