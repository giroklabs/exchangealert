name: FX Spike Alert

on:
  schedule:
    # 평일 KST 09:00~18:00 (UTC 00:00~09:00) -> 글로벌 시장 대응을 위해 24시간 감시로 변경 권장
    # 5분마다 실행 (GitHub 지연 방지를 위해 아래에서 연동 트리거도 병행)
    - cron: '*/5 * * * 1-5'
  workflow_dispatch: # 수동 트리거
  repository_dispatch: # 외부 워크플로에서 트리거 가능
    types: [trigger-fx-alert]

jobs:
  alert:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # last-alert-rate.json 업데이트용

    defaults:
      run:
        working-directory: dollar-investment-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dollar-investment-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run FX Spike Alert
        run: node scripts/alert-fx-spike.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit last-alert-rate.json (if updated)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/last-alert-rate.json || true
          git diff --staged --quiet || git commit -m "chore: update last-alert-rate [skip ci]"
          git push || true
