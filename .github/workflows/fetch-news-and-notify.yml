name: Fetch & Send News Briefing

on:
  schedule:
    # 매일 KST 08:00 (UTC 23:00 전날)
    - cron: '0 23 * * *'
  workflow_dispatch: # 수동 트리거 가능

jobs:
  news-briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # news.json 커밋용

    defaults:
      run:
        working-directory: dollar-investment-web

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: dollar-investment-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest news
        run: node scripts/fetch-news.js

      - name: Send news briefing to Telegram
        run: node scripts/send-news-telegram.js
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Commit updated news.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/news.json || true
          git diff --staged --quiet || git commit -m "chore: update news data [skip ci]"
          git push || true
