name: Fetch Exchange Rates from Naver (5m)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-fetch-naver]

concurrency:
  group: fetch-exchange-rates-naver
  cancel-in-progress: true

jobs:
  fetch-rates:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
    timeout-minutes: 15
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.TRIGGER_TOKEN || secrets.GITHUB_TOKEN }}
        fetch-depth: 0
      
    - name: Create data directories
      run: mkdir -p data/history data/daily
      
    - name: Fetch and Process
      run: |
        echo "=== Naver API Fetch Start ==="
        CURRENT_TIME=$(date '+%Y-%m-%dT%H:%M:%S%z')
        SEARCH_DATE=$(date '+%Y-%m-%d')
        
        echo "$CURRENT_TIME" > data/last-update.txt
        
        # JSON generation with META field to ensure file change every time
        echo "[" > data/exchange-rates.json
        echo "{\"result\":1,\"cur_unit\":\"META\",\"fetched_at\":\"$CURRENT_TIME\"}" >> data/exchange-rates.json
        
        CURRENCIES=(
          "USD:ып╕ъ╡н ыЛмыЯм:1" "JPY:ьЭ╝ы│╕ ьЧФ:100" "EUR:ьЬаыбЬ:1" "GBP:ьШБъ╡н эММьЪ┤ыУЬ:1" "CNY:ьдСъ╡н ьЬДьХИ:1"
          "AUD:эШ╕ьг╝ ыЛмыЯм:1" "CAD:ь║РыВШыЛд ыЛмыЯм:1" "CHF:ьКдьЬДьКд эФДыЮС:1" "HKD:эЩНь╜й ыЛмыЯм:1" "THB:эГЬъ╡н ы░ФэК╕:1"
          "SGD:ьЛ▒ъ░АэПмые┤ ыЛмыЯм:1" "NZD:ыЙ┤ьзИыЮЬыУЬ ыЛмыЯм:1" "SEK:ьКдьЫиыН┤ эБмыбЬыВШ:1" "NOK:ыЕ╕ые┤ьЫиьЭ┤ эБмыбЬыДд:1"
          "DKK:ыН┤ызИэБм эБмыбЬыДд:1" "MYR:ызРыаИьЭ┤ьЛЬьХД ызБъ╣Г:1" "SAR:ьВмьЪ░ыФФ ыжмьЦД:1" "AED:ьХДыЮНьЧРып╕ыжмэК╕ ыФФые┤эХи:1"
          "KWD:ь┐аьЫиьЭ┤эК╕ ыФФыВШые┤:1" "BHD:ы░ФыаИьЭ╕ ыФФыВШые┤:1" "IDR:ьЭ╕ыПДыДдьЛЬьХД ыгиэФ╝ьХД:100" "BND:ы╕МыгиыВШьЭ┤ ыЛмыЯм:1" "KRW:эХЬъ╡н ьЫР:1"
        )
        
        for currency_info in "${CURRENCIES[@]}"; do
          IFS=':' read -r cur_unit cur_nm multiplier <<< "$currency_info"
          response=$(curl -s "https://m.search.naver.com/p/csearch/content/qapirender.nhn?key=calculator&pkid=141&q=эЩШьЬи&where=m&u1=keb&u6=standardUnit&u7=0&u3=$cur_unit&u4=KRW&u8=down&u2=$multiplier")
          rate=$(echo "$response" | jq -r '.country[1].value // "0"')
          
          if [ "$rate" != "0" ] && [ "$rate" != "null" ]; then
            rate_clean=$(echo "$rate" | tr -d ',')
            customer_buy=$(echo "scale=2; $rate_clean * 1.018" | bc)
            customer_sell=$(echo "scale=2; $rate_clean * 0.982" | bc)
            customer_buy_formatted=$(printf "%.2f" $customer_buy)
            customer_sell_formatted=$(printf "%.2f" $customer_sell)
            
            echo ",{\"result\":1,\"cur_unit\":\"$cur_unit\",\"ttb\":\"$customer_buy_formatted\",\"tts\":\"$customer_sell_formatted\",\"deal_bas_r\":\"$rate\",\"bkpr\":\"${rate_clean%.*}\",\"yy_efee_r\":\"0\",\"ten_dd_efee_r\":\"0\",\"kftc_bkpr\":\"${rate_clean%.*}\",\"kftc_deal_bas_r\":\"$rate\",\"cur_nm\":\"$cur_nm\"}" >> data/exchange-rates.json
          fi
        done
        echo "]" >> data/exchange-rates.json
        
        # Verify valid JSON
        if ! jq . data/exchange-rates.json > /dev/null; then
          echo "тЭМ Invalid JSON generated!"
          exit 1
        fi
        
        cp data/exchange-rates.json "data/history/exchange-rates-${SEARCH_DATE}.json"
        
        # Scripts
        node dollar-investment-web/scripts/consolidate-exchange-rates.cjs
        node dollar-investment-web/scripts/generate-intraday.cjs
        node dollar-investment-web/scripts/fetch-news.js
        
    - name: Commit and Push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        git add -A
        
        if git diff --staged --quiet; then
          echo "No changes detected."
        else
          COMMIT_TIME=$(date '+%Y-%m-%d %H:%M:%S KST')
          git commit -m "data: [LIVE-SYNC] Exchange rates update ($COMMIT_TIME)"
          
          PUSHED=false
          for i in 1 2 3; do
            git pull --rebase origin main || true
            if git push origin main; then
              echo "тЬЕ Success: Data pushed."
              PUSHED=true
              break
            fi
            sleep 5
          done
          
          if [ "$PUSHED" = true ]; then
            echo "ЁЯЪА Triggering Deploy..."
            TOKEN="${{ secrets.TRIGGER_TOKEN }}"
            if [ -z "$TOKEN" ]; then TOKEN="${{ secrets.GITHUB_TOKEN }}"; fi
            
            curl -X POST -H "Authorization: token $TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-dollar-investment.yml/dispatches" \
              -d '{"ref":"main"}' || true
          fi
        fi
