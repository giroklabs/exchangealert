name: Fetch Exchange Rates from Naver (5m)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-fetch-naver]

concurrency:
  group: fetch-exchange-rates-naver
  cancel-in-progress: true

jobs:
  fetch-rates:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Seoul
    timeout-minutes: 15
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.TRIGGER_TOKEN || secrets.GITHUB_TOKEN }}
        fetch-depth: 0
      
    - name: Create data directories
      run: mkdir -p data/history data/daily
      
    - name: Fetch and Process
      run: |
        echo "=== Naver API Fetch Start ==="
        CURRENT_TIME=$(date '+%Y-%m-%dT%H:%M:%S%z')
        SEARCH_DATE=$(date '+%Y-%m-%d')
        echo "$CURRENT_TIME" > data/last-update.txt
        
        # JSON generation
        echo "[" > data/exchange-rates.json
        echo "{\"result\":1,\"cur_unit\":\"META\",\"fetched_at\":\"$CURRENT_TIME\"}" >> data/exchange-rates.json
        
        CURRENCIES=(
          "USD:미국 달러:1" "JPY:일본 엔:100" "EUR:유로:1" "GBP:영국 파운드:1" "CNY:중국 위안:1"
          "AUD:호주 달러:1" "CAD:캐나다 달러:1" "CHF:스위스 프랑:1" "HKD:홍콩 달러:1" "THB:태국 바트:1"
          "SGD:싱가포르 달러:1" "NZD:뉴질랜드 달러:1" "SEK:스웨덴 크로나:1" "NOK:노르웨이 크로네:1"
          "DKK:덴마크 크로네:1" "MYR:말레이시아 링깃:1" "SAR:사우디 리얄:1" "AED:아랍에미리트 디르함:1"
          "KWD:쿠웨이트 디나르:1" "BHD:바레인 디나르:1" "IDR:인도네시아 루피아:100" "BND:브루나이 달러:1" "KRW:한국 원:1"
        )
        
        for currency_info in "${CURRENCIES[@]}"; do
          IFS=':' read -r cur_unit cur_nm multiplier <<< "$currency_info"
          response=$(curl -s "https://m.search.naver.com/p/csearch/content/qapirender.nhn?key=calculator&pkid=141&q=환율&where=m&u1=keb&u6=standardUnit&u7=0&u3=$cur_unit&u4=KRW&u8=down&u2=$multiplier")
          rate=$(echo "$response" | jq -r '.country[1].value // "0"')
          
          if [ "$rate" != "0" ] && [ "$rate" != "null" ]; then
            rate_clean=$(echo "$rate" | tr -d ',')
            customer_buy=$(echo "scale=2; $rate_clean * 1.018" | bc)
            customer_sell=$(echo "scale=2; $rate_clean * 0.982" | bc)
            customer_buy_formatted=$(printf "%.2f" $customer_buy)
            customer_sell_formatted=$(printf "%.2f" $customer_sell)
            echo ",{\"result\":1,\"cur_unit\":\"$cur_unit\",\"ttb\":\"$customer_buy_formatted\",\"tts\":\"$customer_sell_formatted\",\"deal_bas_r\":\"$rate\",\"bkpr\":\"${rate_clean%.*}\",\"yy_efee_r\":\"0\",\"ten_dd_efee_r\":\"0\",\"kftc_bkpr\":\"${rate_clean%.*}\",\"kftc_deal_bas_r\":\"$rate\",\"cur_nm\":\"$cur_nm\"}" >> data/exchange-rates.json
          fi
        done
        echo "]" >> data/exchange-rates.json
        
        # Verify valid JSON
        if ! jq . data/exchange-rates.json > /dev/null; then
          echo "❌ Invalid JSON generated!"
          exit 1
        fi
        
        # Save to both History and Daily (Requirement for App)
        cp data/exchange-rates.json "data/history/exchange-rates-${SEARCH_DATE}.json"
        cp data/exchange-rates.json "data/daily/exchange-rates-${SEARCH_DATE}.json"
        
        # Scripts
        node dollar-investment-web/scripts/consolidate-exchange-rates.cjs || echo "Consolidate failed"
        node dollar-investment-web/scripts/generate-intraday.cjs || echo "Intraday failed"
        node dollar-investment-web/scripts/fetch-news.js || echo "News failed"
        
    - name: Commit and Push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        git add -A
        
        if git diff --staged --quiet; then
          echo "No changes detected."
        else
          COMMIT_TIME=$(date '+%Y-%m-%d %H:%M:%S KST')
          git commit -m "data: [LIVE-SYNC] Exchange rates update ($COMMIT_TIME) - Synced to History & Daily"
          
          PUSHED=false
          for i in 1 2 3; do
            git pull --rebase origin main || true
            if git push origin main; then
              echo "✅ Success: Data pushed."
              PUSHED=true
              break
            fi
            sleep 5
          done
          
          if [ "$PUSHED" = true ]; then
            echo "🚀 Triggering Site Deployment (Alert trigger disabled by user)..."
            TOKEN="${{ secrets.TRIGGER_TOKEN }}"
            if [ -z "$TOKEN" ]; then TOKEN="${{ secrets.GITHUB_TOKEN }}"; fi
            
            # 1. 사이트 배포 트리거
            curl -X POST -H "Authorization: token $TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/actions/workflows/deploy-dollar-investment.yml/dispatches" \
              -d '{"ref":"main"}' || true

            # 2. 환율 급변동 및 사용자 알림 트리거 (활성화됨)
            curl -X POST -H "Authorization: token $TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${{ github.repository }}/dispatches" \
              -d '{"event_type":"trigger-fx-alert"}' || true
          fi
        fi
