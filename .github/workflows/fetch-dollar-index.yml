name: Fetch Dollar Index

on:
  schedule:
    # 매일 한국시간 오후 6시 (UTC 9시)에 실행
    # FRED API는 미국 동부 시간 기준으로 업데이트되므로, 
    # 한국시간 오후 6시에는 당일 데이터가 업데이트되어 있을 가능성이 높음
    - cron: '0 9 * * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  fetch-dollar-index:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    env:
      TZ: Asia/Seoul
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch Dollar Index from Alpha Vantage API
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
        run: |
          if [ -z "$ALPHA_VANTAGE_API_KEY" ]; then
            echo "⚠️ Alpha Vantage API 키가 설정되지 않았습니다."
            echo "📝 GitHub Secrets에 ALPHA_VANTAGE_API_KEY를 추가하세요."
            echo "💡 무료 API 키는 https://www.alphavantage.co/support/#api-key 에서 발급받을 수 있습니다."
            echo ""
            echo "🔄 샘플 데이터를 유지합니다."
            exit 0
          fi

          echo "📊 Alpha Vantage API에서 달러 지수 데이터 가져오기..."
          
          # Alpha Vantage API 호출 (FX_DAILY를 사용하여 USD/EUR 등 주요 통화 대비 달러 강도 계산)
          # 또는 FRED API 사용 (DTWEXBGS - Trade Weighted U.S. Dollar Index)
          # 일단 FRED API를 사용하는 것이 더 정확합니다
          
          # FRED API가 없으면 Alpha Vantage의 FX 데이터로 대체
          # USD/EUR, USD/JPY, USD/GBP 등의 가중 평균으로 달러 지수 추정
          RESPONSE=$(curl -s "https://www.alphavantage.co/query?function=FX_DAILY&from_symbol=USD&to_symbol=EUR&apikey=$ALPHA_VANTAGE_API_KEY")
          
          # 오류 체크
          if echo "$RESPONSE" | grep -q '"Error Message"'; then
            echo "❌ API 오류:"
            echo "$RESPONSE" | grep -o '"Error Message":"[^"]*"'
            echo "🔄 샘플 데이터를 유지합니다."
            exit 0
          fi
          
          # Alpha Vantage는 FX 데이터만 제공하므로 FRED API를 우선 사용
          # FRED API가 없으면 샘플 데이터 유지
          echo "💡 Alpha Vantage는 달러 지수를 직접 제공하지 않습니다."
          echo "💡 FRED API를 사용하거나 샘플 데이터를 유지합니다."

      - name: Fetch Dollar Index from FRED API
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          if [ -z "$FRED_API_KEY" ]; then
            echo "⚠️ FRED API 키가 설정되지 않았습니다."
            echo "💡 FRED API는 무료이며 https://fred.stlouisfed.org/docs/api/api_key.html 에서 발급받을 수 있습니다."
            echo "🔄 샘플 데이터를 유지합니다."
            exit 0
          fi
          
          echo "📊 FRED API에서 달러 지수(DTWEXBGS) 데이터 가져오기..."
          
          # FRED API 호출 - Trade Weighted U.S. Dollar Index: Broad, Goods (DTWEXBGS)
          # 최근 1년치 데이터 가져오기 (약 260 영업일)
          # observation_start를 1년 전으로 설정하여 충분한 데이터 확보
          ONE_YEAR_AGO=$(date -d '1 year ago' +%Y-%m-%d 2>/dev/null || date -v-1y +%Y-%m-%d 2>/dev/null || echo "")
          if [ -z "$ONE_YEAR_AGO" ]; then
            # 날짜 계산 실패 시 limit만 사용 (최신 데이터부터 가져오기)
            FRED_RESPONSE=$(curl -s "https://api.stlouisfed.org/fred/series/observations?series_id=DTWEXBGS&api_key=$FRED_API_KEY&file_type=json&limit=260&sort_order=desc&observation_end=$(date +%Y-%m-%d)")
          else
            # 최신 데이터부터 가져오기 (최대 260개)
            FRED_RESPONSE=$(curl -s "https://api.stlouisfed.org/fred/series/observations?series_id=DTWEXBGS&api_key=$FRED_API_KEY&file_type=json&observation_start=$ONE_YEAR_AGO&sort_order=desc&observation_end=$(date +%Y-%m-%d)")
          fi
          
          echo "$FRED_RESPONSE" > /tmp/fred-response.json
          
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');
          
          try {
            const responseData = fs.readFileSync('/tmp/fred-response.json', 'utf8');
            const data = JSON.parse(responseData);
            
            if (data.error_code) {
              console.error('❌ FRED API 오류:', data.error_message);
              process.exit(0);
            }
            
            if (!data.observations || data.observations.length === 0) {
              console.log('⚠️ FRED API 응답에 데이터가 없습니다.');
              console.log('응답 데이터:', JSON.stringify(data, null, 2));
              process.exit(0);
            }
            
            console.log('📊 FRED API 응답 정보:');
            console.log('  - 전체 관측값 개수:', data.observations.length);
            if (data.observations.length > 0) {
              // sort_order=desc이므로 첫 번째가 최신
              console.log('  - 첫 번째 관측값 (최신):', JSON.stringify(data.observations[0]));
              console.log('  - 마지막 관측값 (오래됨):', JSON.stringify(data.observations[data.observations.length - 1]));
            }
            
            // FRED API는 sort_order=desc로 호출했으므로 최신 데이터가 먼저 옴
            // 하지만 날짜순 정렬이 필요하므로 날짜로 정렬
            const observations = data.observations
              .filter(obs => obs.value !== '.' && obs.value !== null)
              .map(obs => ({
                date: obs.date,
                value: parseFloat(obs.value)
              }))
              .sort((a, b) => a.date.localeCompare(b.date)); // 날짜순 정렬 (오래된 순)
            
            console.log('📊 필터링 후 관측값 개수:', observations.length);
            
            // 최근 52주 데이터 사용 (약 260 영업일)
            // 52주 = 약 260 영업일이므로, 최대 260개까지 사용
            // 하지만 실제로는 가능한 한 많은 데이터를 사용 (최대 260개)
            const maxDays = Math.min(260, observations.length);
            const recent52Weeks = observations.slice(-maxDays); // 마지막 260개 (최신 데이터)
            
            const values = recent52Weeks.map(obs => obs.value);
            const sorted = [...values].sort((a, b) => a - b);
            
            // 최신 데이터 날짜 확인
            const latestDate = recent52Weeks[recent52Weeks.length - 1]?.date;
            const latestValue = recent52Weeks[recent52Weeks.length - 1]?.value;
            const today = new Date().toISOString().split('T')[0];
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            const yesterdayStr = yesterday.toISOString().split('T')[0];
            
            // 주말 확인 (토요일=6, 일요일=0)
            const todayDate = new Date();
            const dayOfWeek = todayDate.getDay();
            const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
            
            console.log('📅 날짜 정보:');
            console.log('  - 오늘:', today, isWeekend ? '(주말)' : '(평일)');
            console.log('  - 어제:', yesterdayStr);
            console.log('  - 최신 데이터 날짜:', latestDate);
            console.log('  - 최신 데이터 값:', latestValue);
            
            if (latestDate) {
              const latestDateObj = new Date(latestDate);
              const daysDiff = Math.floor((todayDate - latestDateObj) / (1000 * 60 * 60 * 24));
              console.log('  - 최신 데이터와 오늘의 차이:', daysDiff, '일');
              
              if (daysDiff > 3 && !isWeekend) {
                console.warn('⚠️ 최신 데이터가 3일 이상 지났습니다. FRED API 업데이트 지연 가능성.');
              } else if (daysDiff > 1 && !isWeekend) {
                console.warn('⚠️ 최신 데이터가 어제보다 이전입니다. FRED API 업데이트 지연 가능성.');
              }
            }
            
            const dollarIndexData = {
              date: new Date().toISOString().split('T')[0],
              current: values[values.length - 1], // 가장 최신값
              history: recent52Weeks, // 최근 52주 데이터
              "52week": {
                low: sorted[0],
                high: sorted[sorted.length - 1],
                average: values.reduce((a, b) => a + b, 0) / values.length
              }
            };
            
            console.log('📊 데이터 수집 결과:');
            console.log('  - 전체 관측값:', observations.length);
            console.log('  - 사용된 데이터:', recent52Weeks.length, '개 (최근 52주, 약', Math.round(recent52Weeks.length / 5), '주)');
            console.log('  - 최신 데이터 날짜:', latestDate);
            
            const outputPath = 'dollar-investment-web/public/data/dollar-index.json';
            fs.mkdirSync(path.dirname(outputPath), { recursive: true });
            fs.writeFileSync(outputPath, JSON.stringify(dollarIndexData, null, 2));
            console.log('✅ FRED API에서 달러 지수 데이터 저장 완료:', dollarIndexData.current);
            console.log('📈 52주 최저:', dollarIndexData['52week'].low);
            console.log('📈 52주 최고:', dollarIndexData['52week'].high);
            console.log('📈 52주 평균:', dollarIndexData['52week'].average.toFixed(2));
          } catch (e) {
            console.error('❌ FRED API 데이터 파싱 오류:', e.message);
            process.exit(0); // 오류가 있어도 계속 진행
          }
          EOF

      - name: Commit and push
        if: always()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add dollar-investment-web/public/data/dollar-index.json
          if ! git diff --staged --quiet; then
            git commit -m "Update dollar index data"
            for i in 1 2 3; do
              git pull --rebase origin main || true
              if git push origin main; then
                break
              else
                sleep 5
              fi
            done
            echo "✅ Dollar index data updated and pushed. Deployment should be triggered automatically."
          else
            echo "No changes to commit - data is already up to date"
          fi
      
      - name: Trigger deployment workflow
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            // 배포 워크플로우를 수동으로 트리거
            try {
              // 올바른 API 메서드 사용
              const { data: workflows } = await github.rest.actions.listRepoWorkflows({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              
              const deployWorkflow = workflows.workflows.find(
                w => w.name === 'Deploy Dollar Investment Web to GitHub Pages'
              );
              
              if (deployWorkflow) {
                await github.rest.actions.createWorkflowDispatch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: deployWorkflow.id,
                  ref: 'main',
                });
                console.log('✅ Deployment workflow triggered:', deployWorkflow.name);
              } else {
                console.log('⚠️ Deployment workflow not found. Available workflows:');
                workflows.workflows.forEach(w => console.log(`  - ${w.name} (${w.path})`));
              }
            } catch (error) {
              console.error('❌ Failed to trigger deployment workflow:', error.message);
              console.log('💡 Deployment will be triggered automatically by push event');
            }

